<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#003b78"/>
  <!-- Castle spire (centre) -->
  <polygon points="256,90 296,220 216,220" fill="#0057b8"/>
  <!-- Castle body -->
  <rect x="216" y="220" width="80" height="130" fill="#0057b8"/>
  <!-- Castle wings -->
  <rect x="156" y="270" width="200" height="100" fill="#0057b8"/>
  <!-- Left turret -->
  <rect x="156" y="240" width="44" height="50" fill="#0057b8"/>
  <polygon points="156,240 178,180 200,240" fill="#0057b8"/>
  <!-- Right turret -->
  <rect x="312" y="240" width="44" height="50" fill="#0057b8"/>
  <polygon points="312,240 334,180 356,240" fill="#0057b8"/>
  <!-- Stars -->
  <circle cx="256" cy="165" r="12" fill="#ffd45a"/>
  <circle cx="160" cy="130" r="7" fill="#ffd45a"/>
  <circle cx="350" cy="150" r="7" fill="#ffd45a"/>
  <circle cx="120" cy="200" r="5" fill="#ffd45a"/>
  <circle cx="392" cy="120" r="6" fill="#f86664"/>
</svg>
